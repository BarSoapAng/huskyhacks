<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HuskyHacks Focus</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header>
        <p>Focus Assistant</p>
        <h1 id="timerDisplay">05:00</h1>
      </header>

      <label for="minutesInput">Break timer</label>
      <div class="timer-controls">
        <input id="minutesInput" type="number" min="1" max="180" value="5" />
        <span>min</span>
      </div>

      <div class="actions">
        <button id="startBtn" type="button">Start</button>
        <button id="pauseBtn" type="button">Pause</button>
        <button id="resetBtn" type="button">Reset</button>
      </div>

      <button id="dashboardBtn" class="dashboard-button" type="button">
        Open dashboard
      </button>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
